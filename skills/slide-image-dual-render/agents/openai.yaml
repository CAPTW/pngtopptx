default_prompt: |
  For real slide-image-dual-render conversions, use Hard-Locked Workflow Mode:
  author backend-agnostic slide functions in lib/slides.js, render through scripts/slide_pipeline.js,
  and run scripts/final_gate.js before delivery. Do not generate PPTX directly, do not use
  python-pptx, do not use full-slide screenshots, and do not bypass the shared renderer.
metadata:
  hard_locked_workflow: true
  explicit_invocation_required: false
  approved_entrypoint: scripts/slide_pipeline.js
  final_gate: scripts/final_gate.js
